version: 2
updates:
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: daily
    commit-message:
      prefix: 'bump'
    groups:
      gh-dependencies:
        patterns:
          - '*'

  - package-ecosystem: nix
    directory: '/'
    schedule:
      interval: daily
    commit-message:
      prefix: 'bump'
    groups:
      nix-dependencies:
        patterns:
          - '*'
